<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streamer University Verdict</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  .stage {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 260px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 440px;
    background: #fdfbf3;
    border: 2px solid #d4af37;
    border-radius: 14px;
    padding: 22px 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    transform: translateX(130vw) rotate(14deg);
    transition: transform 0.6s cubic-bezier(0.22, 1.4, 0.36, 1);
    margin-bottom: 28px;
  }

  .card.show {
    transform: translateX(0) rotate(0deg);
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .header img {
    width: 42px;
    height: 42px;
    object-fit: contain;
  }

  .header-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #b8860b;
    text-transform: uppercase;
  }

  .divider {
    height: 2px;
    background: #d4af37;
  }

  .applicant {
    font-size: 16px;
    font-weight: 700;
    color: #b8860b;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .applicant span {
    color: #6d0f1f;
    font-style: italic;
    font-weight: 800;
  }

  .body-text {
    font-size: 13px;
    color: #c9a227;
  }

  .stamp {
    position: absolute;
    top: 38%;
    left: 50%;
    border: 6px solid;
    border-radius: 10px;
    padding: 6px 28px;
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    transform: translate(-50%, -50%) scale(3) rotate(-10deg);
    opacity: 0;
    transition: none;
    white-space: nowrap;
  }

  .stamp.denied {
    color: #c8302e;
    border-color: #c8302e;
    background: rgba(200, 48, 46, 0.08);
  }

  .stamp.approved {
    color: #2c8a3e;
    border-color: #2c8a3e;
    background: rgba(44, 138, 62, 0.08);
  }

  .stamp.show {
    transform: translate(-50%, -50%) scale(1) rotate(-10deg);
    opacity: 1;
    transition: transform 0.4s cubic-bezier(0.17, 0.67, 0.3, 1.4), opacity 0.2s ease-out;
  }
</style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsjUq6mvCwKGr9n64Oo7pGft8NqGcUIaU",
    authDomain: "website-firebase-17385.firebaseapp.com",
    databaseURL: "https://website-firebase-17385-default-rtdb.firebaseio.com",
    projectId: "website-firebase-17385",
    storageBucket: "website-firebase-17385.firebasestorage.app",
    messagingSenderId: "934443626587",
    appId: "1:934443626587:web:12d642d7d1fb4d7cc1cf7e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const card = document.getElementById('card');
  const stamp = document.getElementById('stamp');

  let lastTrigger = 0;
  let hideTimer = null;

  onValue(ref(db, 'verdict'), (snapshot) => {
    const d = snapshot.val();
    if (!d) return;

    if (!d.visible) {
      card.classList.remove('show');
      stamp.classList.remove('show');
      return;
    }

    if (d.trigger === lastTrigger) return;
    lastTrigger = d.trigger;

    clearTimeout(hideTimer);

    stamp.classList.remove('show', 'denied', 'approved');
    stamp.textContent = d.verdict === 'DENIED' ? 'Denied' : 'Approved';
    stamp.classList.add(d.verdict === 'DENIED' ? 'denied' : 'approved');

    card.classList.remove('show');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.classList.add('show');
      });
    });

    setTimeout(() => {
      stamp.classList.add('show');
    }, 650);

    if (d.autoHide) {
      hideTimer = setTimeout(() => {
        card.classList.remove('show');
        stamp.classList.remove('show');
      }, d.autoHide);
    }
  });
</script>
